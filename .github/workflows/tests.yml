name: Automatisation des tests
on: push

jobs:

  compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Compilation
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build
          cd build
          cmake ..
          make

  test_add:
    runs-on: ubuntu-latest
    needs: compilation
    steps:
      - name: Test fonction add
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build && cd build
          cmake .. && make
          ./src/calculator add 10 5

  test_sub:
    runs-on: ubuntu-latest
    needs: compilation
    steps:
      - name: Test fonction sub
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build && cd build
          cmake .. && make
          ./src/calculator sub 10 5

  test_mul:
    runs-on: ubuntu-latest
    needs: compilation
    steps:
      - name: Test fonction mul
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build && cd build
          cmake .. && make
          ./src/calculator mul 5 5

  test_div:
    runs-on: ubuntu-latest
    needs: compilation
    steps:
      - name: Test fonction div
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build && cd build
          cmake .. && make
          ./src/calculator div 10 2

  test_car:
    runs-on: ubuntu-latest
    needs: compilation
    steps:
      - name: Test fonction car
        run: |
          last_directory=$(basename ${{ runner.workspace }})
          git clone https://github.com/${{ github.repository }}.git
          cd ./$last_directory
          mkdir build && cd build
          cmake .. && make
          ./src/calculator car 5

  deploy:
    runs-on: ubuntu-latest
    needs: [test_add, test_sub, test_mul, test_div, test_car]
    steps:
      - name: Déploiement
        run: |
          echo "Déploiement de la solution"